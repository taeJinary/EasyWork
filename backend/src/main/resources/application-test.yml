spring:
  application:
    name: taskflow-test
  datasource:
    url: jdbc:h2:mem:taskflow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

jwt:
  secret: test-secret-key-for-jwt-signing-minimum-32chars
  access-token-expiration: 600000
  refresh-token-expiration: 1200000

app:
  cookie:
    refresh-token-name: refresh_token
    refresh-token-path: /api/v1/auth
    secure: false
    same-site: Lax
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  invitation:
    expires-days: 7

logging:
  level:
    root: INFO

server:
  port: 0
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
