spring:
  application:
    name: taskflow-test
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/taskflow_test?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${TEST_DB_USERNAME:root}
    password: ${TEST_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
      password: ${TEST_REDIS_PASSWORD:}
  task:
    scheduling:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: test-secret-key-for-jwt-signing-minimum-32chars
  access-token-expiration: 600000
  refresh-token-expiration: 1200000

app:
  cookie:
    refresh-token-name: refresh_token
    refresh-token-path: /api/v1/auth
    secure: false
    same-site: Lax
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  invitation:
    expires-days: 7
    email:
      enabled: false
      from: noreply@taskflow.local
      subject-prefix: "[TaskFlow]"
      accept-base-url: http://localhost:5173/invitations
      retry:
        interval-ms: 60000
        delay-seconds: 300
        max-attempts: 10
        max-delay-seconds: 3600
        batch-size: 50
  oauth:
    google:
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      token-uri: https://oauth2.googleapis.com/token
      client-id: test-google-client-id
      client-secret: test-google-client-secret
      redirect-uri: http://localhost:5173/oauth/google
    kakao:
      user-info-uri: https://kapi.kakao.com/v2/user/me
      token-uri: https://kauth.kakao.com/oauth/token
      client-id: test-kakao-client-id
      client-secret: test-kakao-client-secret
      redirect-uri: http://localhost:5173/oauth/kakao
    naver:
      user-info-uri: https://openapi.naver.com/v1/nid/me
      token-uri: https://nid.naver.com/oauth2.0/token
      client-id: test-naver-client-id
      client-secret: test-naver-client-secret
      redirect-uri: http://localhost:5173/oauth/naver
  attachment:
    storage:
      type: local
      root-path: ./build/test-storage/task-attachments
      s3:
        bucket: test-taskflow-attachments
        region: ap-northeast-2
        endpoint: http://localhost:4566
        path-style-access: true
        key-prefix: task-attachments
    cleanup:
      retry-interval-ms: 60000
      retry-delay-seconds: 300
      max-retry-attempts: 10
      max-delay-seconds: 3600
      batch-size: 50
  notification:
    push:
      sender: logging
      retry:
        interval-ms: 60000
        delay-seconds: 300
        max-attempts: 10
        max-delay-seconds: 3600
        batch-size: 50
      fcm:
        endpoint: https://fcm.googleapis.com/fcm/send
        server-key: test-fcm-server-key
  retry-queue:
    maintenance:
      enabled: true
      interval-ms: 300000
      retention-days: 7
      pending-warn-threshold: 100
      delete-batch-size: 200

logging:
  level:
    root: INFO

server:
  port: 0
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
