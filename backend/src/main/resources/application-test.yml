spring:
  application:
    name: taskflow-test
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/taskflow_test?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${TEST_DB_USERNAME:root}
    password: ${TEST_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: ${TEST_REDIS_HOST:localhost}
      port: ${TEST_REDIS_PORT:6379}
      password: ${TEST_REDIS_PASSWORD:}

jwt:
  secret: test-secret-key-for-jwt-signing-minimum-32chars
  access-token-expiration: 600000
  refresh-token-expiration: 1200000

app:
  cookie:
    refresh-token-name: refresh_token
    refresh-token-path: /api/v1/auth
    secure: false
    same-site: Lax
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  invitation:
    expires-days: 7
    email:
      enabled: false
      from: noreply@taskflow.local
      subject-prefix: "[TaskFlow]"
      accept-base-url: http://localhost:5173/invitations
  oauth:
    google:
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  attachment:
    storage:
      root-path: ./build/test-storage/task-attachments

logging:
  level:
    root: INFO

server:
  port: 0
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
