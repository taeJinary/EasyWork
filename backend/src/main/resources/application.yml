spring:
  application:
    name: taskflow

  # === DataSource ===
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/taskflow?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # === JPA ===
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  # === Redis ===
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# === JWT ===
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000      # 30분 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

app:
  cookie:
    refresh-token-name: refresh_token
    refresh-token-path: /api/v1/auth
    secure: false
    same-site: Lax
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  invitation:
    expires-days: 7
    email:
      enabled: false
      from: noreply@taskflow.local
      subject-prefix: "[TaskFlow]"
      accept-base-url: http://localhost:5173/invitations
      retry:
        interval-ms: 60000
        delay-seconds: 300
        max-attempts: 10
        max-delay-seconds: 3600
        batch-size: 50
  oauth:
    google:
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      token-uri: https://oauth2.googleapis.com/token
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:}
    kakao:
      user-info-uri: https://kapi.kakao.com/v2/user/me
      token-uri: https://kauth.kakao.com/oauth/token
      client-id: ${OAUTH_KAKAO_CLIENT_ID:}
      client-secret: ${OAUTH_KAKAO_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:}
    naver:
      user-info-uri: https://openapi.naver.com/v1/nid/me
      token-uri: https://nid.naver.com/oauth2.0/token
      client-id: ${OAUTH_NAVER_CLIENT_ID:}
      client-secret: ${OAUTH_NAVER_CLIENT_SECRET:}
      redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:}
  attachment:
    storage:
      type: local
      root-path: ./storage/task-attachments
      s3:
        bucket: ${ATTACHMENT_S3_BUCKET:}
        region: ${ATTACHMENT_S3_REGION:ap-northeast-2}
        endpoint: ${ATTACHMENT_S3_ENDPOINT:}
        path-style-access: ${ATTACHMENT_S3_PATH_STYLE_ACCESS:false}
        key-prefix: ${ATTACHMENT_S3_KEY_PREFIX:task-attachments}
    cleanup:
      retry-interval-ms: 60000
      retry-delay-seconds: 300
      max-retry-attempts: 10
      max-delay-seconds: 3600
      batch-size: 50
  notification:
    push:
      sender: logging
      retry:
        interval-ms: 60000
        delay-seconds: 300
        max-attempts: 10
        max-delay-seconds: 3600
        batch-size: 50
      fcm:
        endpoint: https://fcm.googleapis.com/fcm/send
        server-key: ${FCM_SERVER_KEY:}
  retry-queue:
    maintenance:
      enabled: true
      interval-ms: 300000
      retention-days: 7
      pending-warn-threshold: 100
      delete-batch-size: 500
  rate-limit:
    auth:
      login:
        ip:
          max-attempts: 30
        email:
          max-attempts: 10
        window-seconds: 60
      token-reissue:
        ip:
          max-attempts: 60
        window-seconds: 60
      oauth-login:
        ip:
          max-attempts: 30
        window-seconds: 60
      oauth-code-login:
        ip:
          max-attempts: 30
        window-seconds: 60
    invitation:
      create:
        user:
          max-attempts: 20
        window-seconds: 60
    comment:
      create:
        user:
          max-attempts: 60
        window-seconds: 60
    attachment:
      upload:
        user:
          max-attempts: 20
        window-seconds: 60
    notification:
      push-token-register:
        user:
          max-attempts: 30
        window-seconds: 60

# === Logging ===
logging:
  level:
    root: INFO
    com.taskflow: INFO

# === Server ===
server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
