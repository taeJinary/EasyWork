spring:
  application:
    name: taskflow

  # === DataSource ===
  datasource:
    url: jdbc:mysql://localhost:3306/taskflow?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # === JPA ===
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    open-in-view: false

  # === Redis ===
  data:
    redis:
      host: localhost
      port: 6379
      password: ""

  # === File Upload ===
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # === OAuth2 ===
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user

# === JWT ===
jwt:
  secret: ${JWT_SECRET:my-very-long-secret-key-for-development-only-32chars-minimum}
  access-token-expiration: 1800000      # 30분 (ms)
  refresh-token-expiration: 1209600000  # 14일 (ms)

# === Logging ===
logging:
  level:
    root: INFO
    com.taskflow: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# === Server ===
server:
  port: 8080
  servlet:
    context-path: /
